version: '3.8'

services:
  # MySQL 数据库服务
  db:
    image: mysql:8.0
    container_name: huanshengxian-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: huanshengxian
      MYSQL_USER: huanshengxian
      MYSQL_PASSWORD: huanshengxian123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - huanshengxian-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Spring Boot 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: huanshengxian-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/huanshengxian?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: huanshengxian
      SPRING_DATASOURCE_PASSWORD: huanshengxian123
      TZ: Asia/Shanghai
    depends_on:
      db:
        condition: service_healthy
    networks:
      - huanshengxian-network

  # 前端服务 (Nginx + 静态文件)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: huanshengxian-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - huanshengxian-network

networks:
  huanshengxian-network:
    driver: bridge

volumes:
  mysql_data:
